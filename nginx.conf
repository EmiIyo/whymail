server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache versioned Vite assets (filenames include a content hash so
    # they never collide between deploys — safe to cache forever).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html is the entry point that loads whichever hashed bundle is
    # current. Any CDN/proxy caching it → users get stuck on an old build even
    # after Ctrl+Shift+R. Force it to always revalidate.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires -1;
    }

    # /version.json drives the in-app auto-reload check. Same story — it MUST
    # come from origin every time, otherwise the app thinks it's up-to-date
    # while it's actually running yesterday's bundle.
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires -1;
    }

    # /manifest.webmanifest changes with icons/theming; short cache is safe
    # but never long-cache.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires -1;
    }

    # Service worker file — same story as index.html. If a CDN pins the old sw,
    # the browser never picks up bugfixes to the SW itself.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # SPA fallback so HashRouter and any deep links resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
